<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Battery Lab and Harvest Logger Preview</title>
  <desc id="desc">Preview graphic for the Battery Lab diagnostic station, showing chemistry selection, voltage input, battery fill meter, harvest log, and cheat sheet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="0" fill="url(#bg)"/>
  <text x="80" y="88" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">🔬 Battery Lab &amp; Harvest Logger</text>
  <text x="82" y="126" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Offline multimeter companion for voltage health checks, local logging, and quick labels.</text>

  <rect x="80" y="165" width="680" height="360" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="220" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">Diagnostic Station</text>

  <text x="120" y="270" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#64748b">Chemistry</text>
  <rect x="120" y="285" width="280" height="54" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="142" y="320" font-family="Inter, Arial, sans-serif" font-size="19" fill="#0f172a">Lithium Coin (3V)</text>

  <text x="440" y="270" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#64748b">Voltage (V)</text>
  <rect x="440" y="285" width="220" height="54" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="462" y="320" font-family="Inter, Arial, sans-serif" font-size="21" fill="#0f172a">3.02</text>

  <rect x="120" y="370" width="540" height="56" rx="12" fill="#2563eb"/>
  <text x="285" y="406" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#ffffff">Analyze Battery</text>

  <rect x="120" y="455" width="540" height="50" rx="25" fill="#e2e8f0" stroke="#cbd5e1"/>
  <rect x="120" y="455" width="470" height="50" rx="25" fill="url(#fill)"/>
  <text x="122" y="550" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Result: 90% • Dial: DC 20V • CR2032 = Lithium Coin</text>

  <rect x="800" y="165" width="320" height="170" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="835" y="215" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Harvest Log</text>
  <text x="835" y="260" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">10:42 AM • Li-Coin • 3.02V • 90%</text>
  <text x="835" y="292" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">10:39 AM • NiMH • 1.28V • 85%</text>

  <rect x="800" y="365" width="320" height="200" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="835" y="415" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Voltage Cheat Sheet</text>
  <text x="835" y="462" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">Li-ion: full 4.2V / low 3.2V</text>
  <text x="835" y="494" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">Alkaline: full 1.6V / low 1.1V</text>
  <text x="835" y="526" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">CR2032: full 3.2V / low 2.0V</text>

  <text x="80" y="645" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">Runs fully offline • GitHub Pages ready • Greenlee DM-20 field workflow</text>
</svg>
